<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Agenda - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      /* ── Agenda toolbar ── */
      .agenda-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        background: #fff;
        border-bottom: 1px solid #e8f0f8;
      }
      .agenda-search-wrap {
        flex: 1;
        max-width: 380px;
        position: relative;
      }
      .agenda-search-wrap input {
        width: 100%;
        padding: 9px 36px 9px 14px;
        border: 1px solid #d8e6f2;
        border-radius: 20px;
        font-size: 13px;
        background: #f5f9ff;
        color: #2d4a7a;
        outline: none;
        box-sizing: border-box;
      }
      .agenda-search-wrap input:focus {
        border-color: #5bb8e8;
        background: #fff;
      }
      .agenda-search-wrap .search-ic {
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
      }
      .month-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
      }
      .mtab {
        padding: 5px 11px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 600;
        color: #8a9fbf;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .mtab:hover {
        background: #f0f6ff;
        color: #2d4a7a;
      }
      .mtab.active {
        background: #0d2b6e;
        color: #fff;
      }

      /* ── Year navigator ── */
      .year-nav {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #f5f9ff;
        border: 1.5px solid #d8e6f2;
        border-radius: 10px;
        padding: 4px 10px;
        flex-shrink: 0;
      }
      .year-label {
        font-size: 14px;
        font-weight: 700;
        color: #0d2b6e;
        min-width: 44px;
        text-align: center;
        letter-spacing: 0.5px;
      }
      .year-arrow {
        background: none;
        border: none;
        font-size: 20px;
        font-weight: 700;
        color: #4a6a9e;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
        border-radius: 6px;
        transition: all 0.12s;
      }
      .year-arrow:hover {
        background: #d8e6f2;
        color: #0d2b6e;
      }
      /* ── Calendar card ── */
      .agenda-card {
        background: #fff;
        border-radius: 12px;
        margin: 20px;
        box-shadow: 0 2px 12px rgba(13, 43, 110, 0.07);
        overflow: hidden;
      }
      .calendar-header {
        display: flex;
        align-items: center;
        background: #0d2b6e;
        color: #fff;
        padding: 14px 20px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .calendar-header svg {
        margin-right: 10px;
      }
      .calendar-header .week-label {
        margin-left: auto;
        font-size: 12px;
        font-weight: 400;
        opacity: 0.7;
      }
      .calendar-grid {
        display: grid;
        grid-template-columns: 60px repeat(7, 1fr);
        border-left: 1px solid #e8f0f8;
      }
      /* Day headers */
      .cal-day-header {
        background: #f5f9ff;
        text-align: center;
        padding: 10px 4px;
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #e8f0f8;
        font-size: 11px;
        font-weight: 600;
        color: #4a6080;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .cal-day-header span.day-num {
        display: block;
        font-size: 15px;
        font-weight: 700;
        color: #2d4a7a;
        margin-top: 2px;
      }
      .cal-day-header.today span.day-num {
        background: #5bb8e8;
        color: #fff;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 2px auto 0;
      }
      .time-col-header {
        background: #f5f9ff;
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #e8f0f8;
      }
      /* Time rows */
      .time-slot {
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #f0f6ff;
        padding: 0 4px;
        font-size: 10px;
        color: #8a9fbf;
        display: flex;
        align-items: flex-start;
        padding-top: 4px;
        height: 48px;
        box-sizing: border-box;
      }
      .cal-cell {
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #f0f6ff;
        height: 110px;
        padding: 3px;
        position: relative;
        box-sizing: border-box;
        overflow: hidden;
      }
      /* Day number */
      .cal-day-num {
        font-size: 11px;
        font-weight: 600;
        color: #4a6080;
        width: 20px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        margin-bottom: 2px;
        flex-shrink: 0;
      }
      .cal-today {
        background: #5bb8e8;
        color: #fff;
        font-weight: 700;
      }
      /* Compact event pill */
      .cal-ev {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: 3px;
        padding: 1px 4px;
        font-size: 9px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 1px;
        overflow: hidden;
        white-space: nowrap;
        min-height: 16px;
        line-height: 1.3;
      }
      .cal-ev-name {
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        white-space: nowrap;
      }
      .cal-ev-badge {
        font-size: 8px;
        font-weight: 800;
        margin-left: 3px;
        opacity: 0.85;
        flex-shrink: 0;
        border-left: 1px solid rgba(0, 0, 0, 0.12);
        padding-left: 3px;
      }
      .cal-more {
        font-size: 9px;
        color: #8a9fbf;
        font-weight: 600;
        padding: 0 2px;
      }
      /* Statut colors */
      .ev-blue {
        background: #d6eeff;
        color: #1a5fa8;
      }
      .ev-teal {
        background: #d0f4f0;
        color: #0d7a6e;
      }
      .ev-orange {
        background: #fde8d8;
        color: #b54a0a;
      }
      .ev-green {
        background: #d8f5e2;
        color: #1a7a3a;
      }

      /* ── Prochaines échéances ── */
      .deadlines-section {
        padding: 0 20px 20px;
      }
      .deadlines-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        color: #4a6080;
        text-transform: uppercase;
        margin-bottom: 12px;
        padding-top: 4px;
      }
      .deadline-item {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        background: #fff;
        border-radius: 10px;
        margin-bottom: 8px;
        box-shadow: 0 1px 6px rgba(13, 43, 110, 0.06);
        cursor: pointer;
        transition: box-shadow 0.15s;
      }
      .deadline-item:hover {
        box-shadow: 0 3px 14px rgba(13, 43, 110, 0.12);
      }
      .dl-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 14px;
        flex-shrink: 0;
      }
      .dl-dot.blue {
        background: #5bb8e8;
      }
      .dl-dot.orange {
        background: #e88a44;
      }
      .dl-dot.green {
        background: #42c97e;
      }
      .dl-body {
        flex: 1;
      }
      .dl-name {
        font-size: 13px;
        font-weight: 600;
        color: #2d4a7a;
      }
      .dl-meta {
        font-size: 11px;
        color: #8a9fbf;
        margin-top: 2px;
      }
      .dl-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 6px;
        white-space: nowrap;
      }
      .dl-badge.en-cours {
        color: #1a5fa8;
        background: #d6eeff;
      }
      .dl-badge.urgent {
        color: #b54a0a;
        background: #fde8d8;
      }
      .dl-badge.valider {
        color: #1a7a3a;
        background: #d8f5e2;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <!-- TOPBAR -->
     <div class="topbar">
        <div class="topbar-brand">
          <img th:src="@{/images/logo_sidebar.svg}" 
               alt="Logo BEA" 
               style="height: 40px; width: auto;" />
        </div>
        <div class="topbar-right">
          <div
            class="notif-btn"
            id="remarqueBtnTopbar"
            title="Remarques"
            style="cursor: pointer; margin-right: 2px"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
            <div
              class="notif-dot remarque-dot"
              id="remarqueDot"
              style="display: none; background: #0d2b6e"
            ></div>
          </div>
          <div class="notif-btn" id="notifBellBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <div class="notif-dot"></div>
          </div>
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="body">
        <!-- SIDEBAR -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- MAIN CONTENT -->
        <div class="main" style="padding: 0; overflow: auto">
          <!-- Toolbar -->
          <div class="agenda-toolbar">
            <div class="agenda-search-wrap">
              <input
                type="text"
                placeholder="Rechercher un projet, une tâche…"
                id="agendaSearch"
              />
              <div class="search-ic">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <circle
                    cx="11"
                    cy="11"
                    r="8"
                    stroke="#B0BDD0"
                    stroke-width="1.8"
                  />
                  <path
                    d="M21 21l-4.35-4.35"
                    stroke="#B0BDD0"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
            </div>
            <div class="year-nav" id="yearNav">
              <button class="year-arrow" id="prevYear" title="Année précédente">
                &#8249;
              </button>
              <span class="year-label" id="yearLabel">2025</span>
              <button class="year-arrow" id="nextYear" title="Année suivante">
                &#8250;
              </button>
            </div>
            <div class="month-tabs" id="monthTabs"></div>
          </div>

          <!-- Calendar -->
          <div class="agenda-card">
            <div class="calendar-header">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect
                  x="3"
                  y="4"
                  width="18"
                  height="18"
                  rx="2"
                  stroke="#5BB8E8"
                  stroke-width="1.5"
                  fill="none"
                />
                <path
                  d="M8 2v4M16 2v4M3 10h18"
                  stroke="#5BB8E8"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
              <span id="calendarTitle">AGENDA — Février 2025</span>
              <span class="week-label" id="weekLabel">Semaine 7</span>
            </div>

            <div class="calendar-grid" id="calendarGrid">
              <!-- Built by JS -->
            </div>
          </div>

          <!-- Prochaines Échéances -->
          <div class="deadlines-section">
            <div class="deadlines-title">Prochaines Échéances</div>
            <div id="deadlinesList">
              <!-- Built by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
    <script th:src="@{/js/sidebar-badge-loader.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/agenda.js}"></script>
  </body>
</html>
