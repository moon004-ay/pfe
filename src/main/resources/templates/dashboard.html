<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Tableau de bord - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="app-shell">

      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-brand">
          <img th:src="@{/images/logo_sidebar.svg}"
              alt="Logo BEA"
              style="height: 40px; width: auto;" />
        </div>
        <div class="topbar-right">
          <div
            class="notif-btn"
            id="remarqueBtnTopbar"
            title="Remarques"
            style="cursor: pointer; margin-right: 2px"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
            <div
              class="notif-dot remarque-dot"
              id="remarqueDot"
              style="display: none; background: #0d2b6e"
            ></div>
          </div>
          <div class="notif-btn" id="notifBellBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <div class="notif-dot"></div>
          </div>
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- BODY -->
      <div class="body">
        <!-- SIDEBAR -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- MAIN CONTENT -->
        <div class="main">
          <!-- ── Cartes statut ── -->
          <div class="quick-cards">
            <div
              class="qcard qcard-encours"
              onclick="window.location.href = '/projets-list?filter=EN_COURS'"
            >
              <div class="qcard-icon">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                  <circle
                    cx="12"
                    cy="12"
                    r="9"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <path
                    d="M12 7v5l3 3"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <div class="qcard-num" id="qcard-encours">0</div>
              <div class="qcard-label">En cours</div>
              <div class="qcard-bar">
                <div class="qcard-bar-fill" id="bar-encours"></div>
              </div>
            </div>
            <div
              class="qcard qcard-noncommence"
              onclick="window.location.href = '/projets-list?filter=NON_COMMENCE'">
              <div class="qcard-icon">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                  <rect
                    x="3"
                    y="5"
                    width="18"
                    height="16"
                    rx="2"
                    stroke="currentColor"
                    stroke-width="1.8"
                    fill="none"
                  />
                  <path
                    d="M8 3v4M16 3v4M3 11h18"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <div class="qcard-num" id="qcard-noncommence">0</div>
              <div class="qcard-label">Non commencés</div>
              <div class="qcard-bar">
                <div class="qcard-bar-fill" id="bar-noncommence"></div>
              </div>
            </div>
            <div
              class="qcard qcard-cloture"
              onclick="window.location.href = '/projets-list?filter=CLOTURE'"
            >
              <div class="qcard-icon">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                  <path
                    d="M20 6L9 17l-5-5"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <div class="qcard-num" id="qcard-cloture">0</div>
              <div class="qcard-label">Clôturés</div>
              <div class="qcard-bar">
                <div class="qcard-bar-fill" id="bar-cloture"></div>
              </div>
            </div>
            <div
              class="qcard qcard-pasvisibilite"
              onclick="window.location.href = '/projets-list?filter=PAS_DE_VISIBILITE'">
              <div class="qcard-icon">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <div class="qcard-num" id="qcard-pasvisibilite">0</div>
              <div class="qcard-label">Pas de visibilité</div>
              <div class="qcard-bar">
                <div class="qcard-bar-fill" id="bar-pasvisibilite"></div>
              </div>
            </div>
          </div>

          <!-- ── Deux colonnes ── -->
          <div class="dash-grid">
            <!-- Avancement global -->
            <div class="form-card">
              <div class="section-label">Avancement global</div>
              <div id="dash-avancement">
                <div style="text-align: center; padding: 40px; color: #8a9fbf">
                  Chargement...
                </div>
              </div>
            </div>

            <!-- Projets récents -->
            <div class="form-card">
              <div class="section-label">Projets récents</div>
              <div id="dash-recent">
                <div style="text-align: center; padding: 40px; color: #8a9fbf">
                  Chargement...
                </div>
              </div>
            </div>
          </div>

          <!-- ── Statistiques par type ── -->
          <div class="form-card" style="margin-top: 16px">
            <div class="section-label">Répartition par type</div>
            <div id="stats-by-type">
              <div style="text-align: center; padding: 40px; color: #8a9fbf">
                Chargement...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script th:src="@{/js/sidebar-badge-loader.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
    <script th:src="@{/js/projets.js}"></script>
  </body>
</html>
