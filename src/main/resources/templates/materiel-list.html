<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Matériels - BEA</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .btn-add {
        background: #0d2b6e;
        color: #fff;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-add:hover {
        background: #1a3f8f;
      }
      .search-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .search-input-m {
        padding: 8px 14px;
        border: 1.5px solid #d8e6f2;
        border-radius: 8px;
        font-size: 13px;
        outline: none;
        width: 260px;
      }
      .search-input-m:focus {
        border-color: #5bb8e8;
      }
      .filter-select {
        padding: 8px 12px;
        border: 1.5px solid #d8e6f2;
        border-radius: 8px;
        font-size: 12px;
        outline: none;
        color: #1a2d5a;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: #fff;
        border-radius: 12px;
        padding: 14px 18px;
        border: 0.5px solid #d8e6f2;
        text-align: center;
      }
      .stat-num {
        font-size: 28px;
        font-weight: 800;
        color: #0d2b6e;
      }
      .stat-label {
        font-size: 11px;
        color: #8a9fbf;
        margin-top: 2px;
      }
      .stat-card.neuf {
        border-top: 3px solid #22c55e;
      }
      .stat-card.bon {
        border-top: 3px solid #5bb8e8;
      }
      .stat-card.usage {
        border-top: 3px solid #f5a623;
      }
      .stat-card.panne {
        border-top: 3px solid #ef4444;
      }
      @media (max-width: 700px) {
        .stats-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="topbar">
        <div class="topbar-brand">
          <img
            th:src="@{/images/logo_sidebar.svg}"
            alt="Logo BEA"
            style="height: 40px; width: auto" />
        </div>
        <div class="topbar-right">
          <div
            class="notif-btn"
            id="remarqueBtnTopbar"
            title="Remarques"
            style="cursor: pointer; margin-right: 2px">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                stroke="#4A6A9E"
                stroke-width="1.8"
                fill="none" />
            </svg>
            <div
              class="notif-dot remarque-dot"
              id="remarqueDot"
              style="display: none"></div>
          </div>
          <div class="notif-btn" id="notifBellBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round" />
            </svg>
            <div class="notif-dot"></div>
          </div>
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="body">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="main">
          <!-- Stats -->
          <div class="stats-row" id="statsRow">
            <div class="stat-card neuf">
              <div class="stat-num" id="st-neuf">0</div>
              <div class="stat-label">Neufs</div>
            </div>
            <div class="stat-card bon">
              <div class="stat-num" id="st-bon">0</div>
              <div class="stat-label">Bon état</div>
            </div>
            <div class="stat-card usage">
              <div class="stat-num" id="st-usage">0</div>
              <div class="stat-label">Usagés</div>
            </div>
            <div class="stat-card panne">
              <div class="stat-num" id="st-panne">0</div>
              <div class="stat-label">En panne</div>
            </div>
          </div>

          <div class="table-card">
            <div class="page-header">
              <div class="page-title">Matériels</div>
              <button
                class="btn-add"
                onclick="window.location.href = '/materiels/new'">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M12 5v14M5 12h14"
                    stroke="white"
                    stroke-width="2.2"
                    stroke-linecap="round" />
                </svg>
                Nouveau matériel
              </button>
            </div>

            <div class="search-bar">
              <input
                class="search-input-m"
                type="text"
                id="searchInput"
                placeholder="Rechercher par nom, marque…"
                oninput="filterMateriels()" />
              <select
                class="filter-select"
                id="filterStatut"
                onchange="filterMateriels()">
                <option value="">Tous les États</option>
                <option value="NEUF">Neuf</option>
                <option value="BON_ETAT">Bon état</option>
                <option value="USAGE">Usagé</option>
                <option value="EN_PANNE">En panne</option>
              </select>
              <select
                class="filter-select"
                id="filterStatutDispo"
                onchange="filterMateriels()">
                <option value="">Tous les Statuts</option>
                <option value="Disponible">Disponible</option>
                <option value="En utilisation">En utilisation</option>
                <option value="En réparation">En réparation</option>
                <option value="Hors service">Hors service</option>
              </select>
            </div>

            <table class="data-table">
              <thead>
                <tr>
                  <th>Marque</th>
                  <th>Nom</th>
                  <th>Bureau</th>
                  <th>Service</th>
                  <th>État</th>
                  <th>Quantité</th>

                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="materielsBody">
                <tr>
                  <td
                    colspan="9"
                    style="text-align: center; padding: 40px; color: #b0bdd0">
                    Chargement...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/sidebar-badge-loader.js}"></script>
    <script
      th:src="@{/js/R
    eservation.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/Reservation.js}"></script>
    <script>
      const ETAT_LABEL = {
        NEUF: "Neuf",
        BON_ETAT: "Bon état",
        USAGE: "Usagé",
        EN_PANNE: "En panne",
      };
      const ETAT_COLOR = {
        NEUF: "#22c55e",
        BON_ETAT: "#5bb8e8",
        USAGE: "#f5a623",
        EN_PANNE: "#ef4444",
      };
      let allMateriels = [];

      async function loadMateriels() {
        try {
          const res = await fetch("/api/materiels", {
            headers: getAuthHeaders(),
          });
          if (!res.ok) {
            renderEmpty();
            return;
          }
          allMateriels = await res.json();
          updateStats();
          renderMateriels(allMateriels);
        } catch (e) {
          renderEmpty();
        }
      }

      function updateStats() {
        const counts = { NEUF: 0, BON_ETAT: 0, USAGE: 0, EN_PANNE: 0 };
        allMateriels.forEach((m) => {
          if (counts[m.etat] !== undefined) counts[m.etat]++;
        });
        document.getElementById("st-neuf").textContent = counts.NEUF;
        document.getElementById("st-bon").textContent = counts.BON_ETAT;
        document.getElementById("st-usage").textContent = counts.USAGE;
        document.getElementById("st-panne").textContent = counts.EN_PANNE;
      }

      function filterMateriels() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const etat = document.getElementById("filterStatut").value;
        const statut = document.getElementById("filterStatutDispo").value;

        let list = allMateriels;
        if (q)
          list = list.filter(
            (m) =>
              (m.nom || "").toLowerCase().includes(q) ||
              (m.marque || "").toLowerCase().includes(q),
          );
        if (etat) list = list.filter((m) => m.etat === etat);
        if (statut) list = list.filter((m) => m.statut === statut);
        renderMateriels(list);
      }

      function renderMateriels(list) {
        const tbody = document.getElementById("materielsBody");
        if (!list.length) {
          renderEmpty();
          return;
        }

        tbody.innerHTML = list
          .map((m) => {
            const color = ETAT_COLOR[m.etat] || "#8a9fbf";
            const label = ETAT_LABEL[m.etat] || m.etat || "—";

            // ✅ Badge "Réservé" si EN_UTILISATION — défini DANS le .map()
            const resaBadge =
              m.statut === "EN_UTILISATION"
                ? `<span style="background:#fff3cd;color:#856404;padding:2px 7px;
                border-radius:10px;font-size:10px;font-weight:700;
                margin-left:6px;border:1px solid #ffc107">🔒 Réservé</span>`
                : "";

            return `<tr>
            <td style="font-weight:700;color:#0d2b6e">${m.marque || "—"}</td>
            
            <td style="font-weight:600;color:#1a2d5a">${m.nom || "—"} ${resaBadge}</td>
            <td><span style="background:#eef4ff;color:#4a6a9e;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600">${m.bureau || "—"}</span></td>
            <td><span style="background:#eef4ff;color:#4a6a9e;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600">${m.service || "—"}</span></td>
            <td><span style="background:${color}22;color:${color};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${label}</span></td>
            <td style="text-align:center;font-weight:600">${m.quantite ?? "—"}</td>

           
            <td style="white-space:nowrap">
              <button onclick="window.location.href='/materiels/edit/${m.id}'"
                style="background:#eef4ff;border:none;padding:5px 10px;border-radius:6px;
                       cursor:pointer;font-size:11px;color:#0d2b6e;font-weight:600">
                Modifier
              </button>
            
              <button onclick="deleteMateriel(${m.id})"
                style="background:#fee;border:none;padding:5px 10px;border-radius:6px;
                       cursor:pointer;font-size:11px;color:#c00;font-weight:600;margin-left:4px">
                Supprimer
              </button>
              
            </td>
          </tr>`;
          })
          .join("");
      }

      function renderEmpty() {
        document.getElementById("materielsBody").innerHTML =
          '<tr><td colspan="9" style="text-align:center;padding:40px;color:#b0bdd0">Aucun matériel trouvé</td></tr>';
      }

      async function deleteMateriel(id) {
        if (!confirm("Supprimer ce matériel ?")) return;
        try {
          const res = await fetch(`/api/materiels/${id}`, {
            method: "DELETE",
            headers: getAuthHeaders(),
          });
          if (res.ok) loadMateriels();
          else alert("Erreur suppression");
        } catch (e) {
          alert("Erreur réseau");
        }
      }

      document.addEventListener("DOMContentLoaded", loadMateriels);
    </script>
  </body>
</html>
