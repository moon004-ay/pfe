    <script>
      // ── Active nav highlight ──────────────────────────────────────
      (function () {
        var path = window.location.pathname;
        var map = {
          "/dashboard": "nav-dashboard",
          "/projets-list": "nav-projets-list",
          "/projets/new": "nav-projets-new",
          "/projets/edit": "nav-projets-list",
          "/remarques": "nav-remarques",
          "/mes-taches": "nav-mes-taches",
          "/materiels-list": "nav-materiels",
          "/materiels/new": "nav-materiels-new",
          "/materiels/edit": "nav-materiels",
          "/reservations-list": "nav-reservations",
          "/users-list": "nav-users",
          "/users/new": "nav-users-new",
          "/users/edit": "nav-users",
          "/agenda": "nav-agenda",
          "/problemes": "nav-problemes",
        };
        var activeId = null;
        for (var route in map) {
          if (path.startsWith(route)) {
            activeId = map[route];
            break;
          }
        }
        if (activeId) {
          var el = document.getElementById(activeId);
          if (el) el.classList.add("active");
        }
      })();

      // ── Badge réservations EN_ATTENTE ─────────────────────────────
      document.addEventListener("DOMContentLoaded", function () {
        var token = localStorage.getItem("token");
        if (!token) return;
        fetch("/api/reservations/all", {
          headers: { Authorization: "Bearer " + token },
        })
          .then(function (r) {
            return r.ok ? r.json() : [];
          })
          .then(function (list) {
            var count = list.filter(function (r) {
              return r.statut === "EN_ATTENTE";
            }).length;
            if (count > 0) {
              var badge = document.getElementById("navResaBadge");
              if (badge) {
                badge.textContent = count;
                badge.style.display = "inline";
              }
            }
          })
          .catch(function () {});
      });
    </script>
