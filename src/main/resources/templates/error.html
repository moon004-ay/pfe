<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Erreur - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      .error-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f0f4fa;
        text-align: center;
        padding: 20px;
      }
      .error-card {
        background: white;
        border-radius: 16px;
        padding: 48px;
        max-width: 500px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }
      .error-icon {
        width: 80px;
        height: 80px;
        background: #fee;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .error-code {
        font-size: 72px;
        font-weight: 700;
        color: #e05a2b;
        margin-bottom: 16px;
      }
      .error-message {
        font-size: 24px;
        font-weight: 600;
        color: #0d2b6e;
        margin-bottom: 16px;
      }
      .error-description {
        color: #8a9fbf;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      .error-actions {
        display: flex;
        gap: 16px;
        justify-content: center;
      }
      .btn-primary {
        background: #0d2b6e;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .btn-secondary {
        background: transparent;
        color: #0d2b6e;
        padding: 12px 24px;
        border: 1px solid #d8e6f2;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .btn-primary:hover {
        background: #1a3f8f;
      }
      .btn-secondary:hover {
        background: #f5f8fd;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-card">
        <div class="error-icon">
          <svg
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#E05A2B"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <circle cx="12" cy="16" r="0.5" fill="#E05A2B" stroke="none" />
          </svg>
        </div>
        <div class="error-code" th:text="${status} ?: '404'">404</div>
        <div class="error-message" th:text="${error} ?: 'Page non trouvée'">
          Page non trouvée
        </div>
        <div
          class="error-description"
          th:text="${message} ?: 'Désolé, la page que vous recherchez n\'existe pas ou a été déplacée.'"
        >
          Désolé, la page que vous recherchez n'existe pas ou a été déplacée.
        </div>
        <div class="error-actions">
          <a href="/dashboard" class="btn-primary">🏠 Tableau de bord</a>
          <a href="javascript:history.back()" class="btn-secondary">◀ Retour</a>
        </div>
      </div>
    </div>
    <div th:replace="fragments/sidebar :: sidebar"></div>
  </body>
</html>
